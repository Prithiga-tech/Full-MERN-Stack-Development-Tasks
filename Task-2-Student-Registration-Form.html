<!DOCTYPE html>
<html>

<head>
    <title>Student Registration Form</title>
</head>

<body>

    <h1 align="center">Student Registration Form</h1>
    <hr>

    <form>

        <label>Full Name:</label><br>
        <input type="text" placeholder="Enter your name" required>
        <br><br>

        <label>Email:</label><br>
        <input type="email" placeholder="Enter your email" required>
        <br><br>

        <label>Password:</label><br>
        <input type="password" required>
        <br><br>

        <label>Phone Number:</label><br>
        <input type="tel" placeholder="Enter your phone number">
        <br><br>

        <label>Age:</label><br>
        <input type="number" min="18" max="30">
        <br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other
        <br><br>

        <label>Department:</label><br>
        <select required>
            <option value="">Select Department</option>
            <option>Computer Science</option>
            <option>Information Technology</option>
            <option>Electronics</option>
            <option>Mechanical</option>
            <option>Civil</option>
        </select>
        <br><br>

        <label>Skills:</label><br>
        <input type="checkbox"> HTML<br>
        <input type="checkbox"> CSS<br>
        <input type="checkbox"> JavaScript<br>
        <input type="checkbox"> Python
        <br><br>

        <label>Address:</label><br>
        <textarea rows="4" cols="30" placeholder="Enter your address"></textarea>
        <br><br>

        <label>Date of Birth:</label><br>
        <input type="date">
        <br><br>

        <input type="checkbox" required>
        I agree to the Terms and Conditions.
        <br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Clear">

    </form>

    <hr>

    <p align="center">
        Student Registration Form | HTML Practice
    </p>

</body>

</html>
